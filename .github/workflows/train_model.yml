name: Train TLR2 Model

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 1 * *'  # monthly, 3am UTC

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install training dependencies
        run: |
          pip install \
            requests \
            rdkit \
            scikit-learn \
            xgboost \
            onnxmltools \
            skl2onnx \
            onnxruntime \
            numpy \
            pandas

      - name: Step 1 - Inventory ChEMBL TLR2 target
        run: |
          cd tlr2-screener
          python scripts/1_explore_target.py

      - name: Step 2 - Build dataset from ChEMBL (IC50+EC50, UniProt O60603)
        run: |
          cd tlr2-screener
          python scripts/2_build_dataset.py

      - name: Step 2b - Generate property-matched decoys (negative class)
        run: |
          cd tlr2-screener
          python scripts/2b_generate_decoys.py

      - name: Step 3 - Train with Bemis-Murcko scaffold split
        run: |
          cd tlr2-screener
          python scripts/3_train_scaffold_split.py

      - name: Step 4 - Export to ONNX for Vercel serving
        run: |
          cd tlr2-screener
          python scripts/4_export_onnx.py

      - name: Archive raw and clean data
        run: |
          mkdir -p tlr2-screener/ml/data
          [ -f tlr2-screener/tlr2_clean.csv ] && mv tlr2-screener/tlr2_clean.csv tlr2-screener/ml/data/chembl_tlr2_clean.csv || true
          [ -f tlr2-screener/tlr2_with_decoys.csv ] && mv tlr2-screener/tlr2_with_decoys.csv tlr2-screener/ml/data/chembl_tlr2_with_decoys.csv || true

      - name: Commit updated model
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tlr2-screener/ml/model/tlr2_clf.onnx \
                  tlr2-screener/ml/model/clf_meta.json \
                  tlr2-screener/ml/data/chembl_tlr2_clean.csv \
                  tlr2-screener/ml/data/chembl_tlr2_with_decoys.csv
          git diff --cached --quiet && echo "No model changes" || \
            git commit -m "chore: retrain TLR2 model from ChEMBL (scaffold split + decoys) [skip ci]"

      - name: Push to main
        run: git push origin main
