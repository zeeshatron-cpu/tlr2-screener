name: Verify TLR2 Target

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Verify CHEMBL4523 is actually human TLR2
        run: |
          cd tlr2-screener
          python scripts/verify_target.py
